<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

    <a class="navbar-brand">
        Dashboard
    </a>

    <div class="ml-auto">
        <button class="btn btn-dark btn-sm text-white" (click)="logout()">
            <i class="fa fa-sign-out"></i>
            Sign out
        </button>
    </div>

</nav>

<div class="container mt-4">

    <!-- ROW 1: OVERVIEW -->
    <div class="row mb-3">
        <div class="col-12">
            <h2>Overview</h2>
        </div>
    </div>
    <div class="row d-flex align-items-stretch mb-5">

        <!-- LEFT: Donut Chart -->
        <div class="col-md-6 d-flex">
            <div class="card shadow-sm mb-3 h-100 w-100">
                <div class="card-header">
                    Card Title
                </div>
                <div class="card-body d-flex justify-content-center align-items-center">
                    <canvas id="donutChart"></canvas>
                </div>
            </div>
        </div>

        <!-- RIGHT: Bar Chart -->
        <div class="col-md-6 d-flex">
            <div class="card shadow-sm mb-3 h-100 w-100">
                <div class="card-header">
                    Card Title
                </div>
                <div class="card-body d-flex justify-content-center align-items-center">
                    <canvas id="barChart"></canvas>
                </div>
            </div>
        </div>

    </div>

    <!-- ROW 2: TABLE -->
    <div class="row mb-3">
        <div class="col-12">
            <h2>User List</h2>
        </div>
    </div>
    
    <div class="row">

        <div class="col-12">
            <div class="card shadow-sm mb-5">

                <table class="table table-bordered mb-0" *ngIf="data?.tableUsers?.length">

                    <thead>
                        <tr>
                            <th>#</th>
                            <th>First Name</th>
                            <th>Last Name</th>
                            <th>Username</th>
                        </tr>
                    </thead>

                    <tbody>
                        <tr *ngFor="let user of data.tableUsers; let i = index">
                            <td>{{ i + 1 }}</td>
                            <td>{{ user.firstName }}</td>
                            <td>{{ user.lastName }}</td>
                            <td>{{ user.username }}</td>
                        </tr>
                    </tbody>

                </table>

            </div>
        </div>
    </div>
</div>
